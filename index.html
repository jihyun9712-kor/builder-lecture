<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>운세 정보 입력</title>
  <link href='style.css' rel='stylesheet'>
</head>
<body>
  <div class="theme-toggle">
    <button id="theme-btn">🌙 다크 모드</button>
  </div>

  <div class="form-container">
    <h2>운세 정보 입력</h2>
    <form action="https://formspree.io/f/mreawnzj" method="POST">
      <div class="form-group">
        <label for="name">이름</label>
        <input type="text" id="name" name="이름" required placeholder="이름을 입력하세요">
      </div>
      <div class="form-group">
        <label for="birth">생년월일시</label>
        <input type="datetime-local" id="birth" name="생년월일시" required>
      </div>
      <div class="form-group">
        <label>성별</label>
        <div class="radio-group">
          <label><input type="radio" name="성별" value="남성" required> 남성</label>
          <label><input type="radio" name="성별" value="여성"> 여성</label>
        </div>
      </div>
      <button type="submit" class="submit-btn">정보 전송</button>
    </form>
  </div>

  <div class="comments-container">
    <div id="disqus_thread"></div>
  </div>

  <script>
    var disqus_config = function () {
      this.page.url = window.location.href;
      this.page.identifier = window.location.pathname;
    };
    (function() { 
    var d = document, s = d.createElement('script');
    s.src = 'https://productbeginner.disqus.com/embed.js';
    s.setAttribute('data-timestamp', +new Date());
    (d.head || d.body).appendChild(s);
    })();
  </script>
  <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
  <script defer type="text/javascript" src="main.js"></script>
</body>
</html>
